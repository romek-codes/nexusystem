site_name: nexusystem docs
site_description: Documentation for the nexusystem NixOS + Home Manager configuration
site_url: https://romek-codes.github.io/nexusystem/
repo_url: https://github.com/romek-codes/nexusystem
repo_name: nexusystem
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  logo: assets/favicon.png
  favicon: assets/favicon.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Themes: themes.md
  - Keybindings: keybindings.md
  - Usage tips: usage_tips.md
  - Contributing: contributing.md
